services:
  - type: web
    name: agent-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python scripts/generate_crm.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 8001"
    envVars:
      - key: GROQ_API_KEY
        scope: build,runtime
      - key: PYTHON_VERSION
        value: "3.11"
    routes:
      - type: http
        path: /
        destination: /
      - type: http
        path: /chat
        destination: /chat
      - type: http
        path: /history
        destination: /history
      - type: http
        path: /escalations
        destination: /escalations

  - type: web
    name: agent-frontend
    env: python
    plan: free
    buildCommand: "pip install -r streamlit_requirements.txt"
    startCommand: "streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0"
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: API_URL
        scope: runtime
        value: "https://agent-backend.onrender.com"
    routes:
      - type: http
        path: /
        destination: /
